<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miner Tycoon Classic</title>
    <style>
        body { background: #0f0f13; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 15px; }
        .card { background: #1a1a24; padding: 20px; border-radius: 20px; border: 1px solid #333; display: inline-block; width: 100%; max-width: 350px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #444; background: #000; color: white; outline: none; }
        .stat-box { background: #111; padding: 15px; border-radius: 15px; border: 2px solid #ffd700; margin: 15px auto; font-size: 28px; color: #ffd700; max-width: 300px; }
        .miner-area { margin: 20px 0; }
        .stone-img { width: 130px; height: 130px; cursor: pointer; transition: 0.1s; }
        .stone-img:active { transform: scale(0.95); }
        .inventory { display: flex; justify-content: center; gap: 8px; margin: 15px 0; flex-wrap: wrap; }
        .inv-item { background: #222; padding: 4px 10px; border-radius: 8px; font-size: 11px; border: 1px solid #444; }
        .cases-container { display: grid; grid-template-columns: 1fr; gap: 10px; max-width: 400px; margin: 0 auto; }
        .case-card { background: #1a1a24; padding: 15px; border-radius: 15px; border: 1px solid #333; }
        button { color: white; border: none; padding: 10px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 8px; }
        .btn-auth { background: #ffd700; color: #000; margin-bottom: 5px; }
        .btn-case { background: #8e44ad; }
        button:disabled { background: #333; color: #666; cursor: not-allowed; }
    </style>
</head>
<body>

    <div id="auth">
        <div class="card">
            <h2 style="color:#ffd700">ВХІД В ШАХТУ</h2>
            <input type="text" id="u" placeholder="Логін">
            <input type="password" id="p" placeholder="Пароль">
            <button class="btn-auth" onclick="doRegister()">РЕЄСТРАЦІЯ</button>
            <button class="btn-auth" style="background:#fff" onclick="doLogin()">УВІЙТИ</button>
        </div>
    </div>

    <div id="game" style="display:none;">
        <div class="stat-box">💰 <span id="money">0</span></div>
        
        <div class="miner-area">
            <p id="stone-name">Опал</p>
            <img id="main-stone" src="img/opal.png" class="stone-img" onclick="doClick()" onerror="this.src='https://via.placeholder.com/130?text=OPAL'">
        </div>

        <div class="inventory" id="inv"></div>

        <div class="cases-container">
            <div class="case-card">
                <small>КЕЙС З КАМІННЯМ</small>
                <div>Ціна: 500</div>
                <button id="buy-btn" class="btn-case" onclick="openCase()">ВІДКРИТИ</button>
            </div>
        </div>
        
        <button onclick="doLogout()" style="background:none; color:#555; font-size:12px; text-decoration:underline; margin-top:20px;">Вийти з акаунта</button>
    </div>

    <script>
        let curUser = null;
        const dbKey = 'miner_db';

        function getDB() { return JSON.parse(localStorage.getItem(dbKey) || '{}'); }
        function saveDB(db) { localStorage.setItem(dbKey, JSON.stringify(db)); }

        function doRegister() {
            const u = document.getElementById('u').value.trim();
            const p = document.getElementById('p').value.trim();
            if(!u || !p) return alert("Заповни всі поля!");
            let db = getDB();
            if(db[u]) return alert("Такий логін вже є!");
            db[u] = { pass: p, money: 0, power: 1, items: ["Опал"] };
            saveDB(db);
            alert("Успішно! Тепер тисни 'Увійти'");
        }

        function doLogin() {
            const u = document.getElementById('u').value.trim();
            const p = document.getElementById('p').value.trim();
            let db = getDB();
            if(db[u] && db[u].pass === p) {
                curUser = u;
                localStorage.setItem('miner_session', u);
                showGame();
            } else { alert("Невірний логін або пароль"); }
        }

        function showGame() {
            document.getElementById('auth').style.display = 'none';
            document.getElementById('game').style.display = 'block';
            update();
        }

        function update() {
            if(!curUser) return;
            let db = getDB();
            let data = db[curUser];
            
            document.getElementById('money').innerText = Math.floor(data.money);
            document.getElementById('buy-btn').disabled = data.money < 500;

            const invDiv = document.getElementById('inv');
            invDiv.innerHTML = "";
            data.items.forEach(it => { invDiv.innerHTML += `<div class="inv-item">${it}</div>`; });

            const img = document.getElementById('main-stone');
            const nameTxt = document.getElementById('stone-name');
            if(data.items.includes("Рубін")) { img.src="img/ruby.png"; nameTxt.innerText="Рубін"; }
            else if(data.items.includes("Діамант")) { img.src="img/diam.png"; nameTxt.innerText="Діамант"; }
            else { img.src="img/opal.png"; nameTxt.innerText="Опал"; }
        }

        function doClick() {
            let db = getDB();
            db[curUser].money += db[curUser].power;
            saveDB(db);
            update();
        }

        function openCase() {
            let db = getDB();
            let data = db[curUser];
            if(data.money >= 500) {
                data.money -= 500;
                let r = Math.random();
                let loot = r > 0.7 ? "Рубін" : "Діамант";
                let gain = loot === "Рубін" ? 50 : 15;
                
                if(!data.items.includes(loot)) data.items.push(loot);
                data.power += gain;
                alert("Випало: " + loot + "!");
                saveDB(db);
                update();
            }
        }

        function doLogout() {
            localStorage.removeItem('miner_session');
            location.reload();
        }

        setInterval(() => {
            if(!curUser) return;
            let db = getDB();
            db[curUser].money += (db[curUser].power / 10);
            saveDB(db);
            update();
        }, 1000);

        window.onload = () => {
            let session = localStorage.getItem('miner_session');
            if(session) { curUser = session; showGame(); }
        }
    </script>
</body>
</html>
