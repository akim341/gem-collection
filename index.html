<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miner Tycoon</title>
    <style>
        body { background: #0f0f13; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .card { background: #1a1a24; padding: 20px; border-radius: 20px; border: 1px solid #333; display: inline-block; width: 100%; max-width: 350px; }
        .stat-box { background: #111; padding: 15px; border-radius: 15px; border: 2px solid #ffd700; margin: 20px 0; font-size: 28px; color: #ffd700; }
        .miner-area { margin: 20px 0; }
        .stone-img { width: 120px; height: 120px; cursor: pointer; transition: 0.1s; }
        .stone-img:active { transform: scale(0.9); }
        .inventory { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .inv-item { background: #222; padding: 5px 10px; border-radius: 10px; font-size: 12px; border: 1px solid #444; }
        .case-section { background: #251a33; padding: 15px; border-radius: 15px; border: 1px solid #8e44ad; }
        button { background: #8e44ad; color: white; border: none; padding: 12px; border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        button:disabled { background: #333; }
    </style>
</head>
<body>

    <div id="game" style="max-width: 400px; margin: 0 auto;">
        <div class="stat-box">💰 <span id="money">0</span></div>
        <div class="miner-area">
            <p id="current-stone-name">Вугілля</p>
            <img id="main-stone" src="img/coal.png" class="stone-img" onclick="doClick()" onerror="this.src='https://via.placeholder.com/120?text=STONE'">
        </div>
        <div class="inventory" id="inv"></div>
        <div class="case-section">
            <img src="img/case.png" style="width: 60px;" onerror="this.src='https://via.placeholder.com/60?text=CASE'">
            <p>МАГІЧНИЙ КЕЙС</p>
            <small>Ціна: 500 | Шанс: Опал / Діамант</small>
            <button id="buy-case" onclick="openCase()">ВІДКРИТИ КЕЙС</button>
        </div>
    </div>

    <script>
        let money = parseFloat(localStorage.getItem('m_money')) || 0;
        let power = parseFloat(localStorage.getItem('m_power')) || 1;
        let items = JSON.parse(localStorage.getItem('m_items')) || ["Вугілля"];

        function save() {
            localStorage.setItem('m_money', money);
            localStorage.setItem('m_power', power);
            localStorage.setItem('m_items', JSON.stringify(items));
        }

        function updateUI() {
            document.getElementById('money').innerText = Math.floor(money);
            document.getElementById('buy-case').disabled = money < 500;
            const invDiv = document.getElementById('inv');
            invDiv.innerHTML = "";
            items.forEach(it => { invDiv.innerHTML += `<div class="inv-item">${it}</div>`; });
            const mainImg = document.getElementById('main-stone');
            if(items.includes("Діамант")) {
                mainImg.src = "img/diam.png";
                document.getElementById('current-stone-name').innerText = "Діамант";
            } else if(items.includes("Опал")) {
                mainImg.src = "img/opal.png";
                document.getElementById('current-stone-name').innerText = "Опал";
            }
        }

        function doClick() {
            money += power;
            save();
            updateUI();
        }

        function openCase() {
            if(money >= 500) {
                money -= 500;
                let chance = Math.random();
                let loot = chance > 0.8 ? "Діамант" : "Опал";
                if(loot === "Діамант") power += 50; else power += 10;
                if(!items.includes(loot)) items.push(loot);
                alert("Тобі випав: " + loot + "!");
                save();
                updateUI();
            }
        }

        setInterval(() => {
            money += (power / 5);
            updateUI();
            save();
        }, 1000);

        updateUI();
    </script>
</body>
</html>
